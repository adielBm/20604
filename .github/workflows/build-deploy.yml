name: Deploy Pandoc Site

# Trigger on any push to the master branch
on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository (so that the workflow can see index.md, style.css, etc.)
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Install Pandoc via apt
      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      # 3. Run the Pandoc command exactly as you specified
      - name: Generate HTML with Pandoc
        run: |
          pandoc index.md \
            -o index.html \
            --standalone \
            --mathjax=https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml-full.js \
            --resource-path=.:images

      # 4. Prepare a "public/" directory that contains exactly what we want to publish:
      #    - index.html (just generated)
      #    - style.css
      #    - script.js
      #    - the entire images/ folder (so that any embedded images still resolve)
      - name: Collect static assets into public/
        run: |
          mkdir public
          cp index.html public/
          cp style.css public/
          cp script.js public/
          cp -R images public/

      # 5. Deploy to the gh-pages branch using peaceiris/actions-gh-pages
      - name: Publish to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          # This token is provided automatically by GitHub Actions; no extra setup needed.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Publish everything under the `public/` directory
          publish_dir: public
          # By default, the action will push to gh-pages. If your repository is
          # already serving from gh-pages, you do not need to change this.
          # If you prefer a different branch name, you can add:
          #   publish_branch: your-branch-name
