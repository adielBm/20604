name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - master  # Trigger on pushes to the master branch
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Set up Pandoc
      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      # Step 3: Convert index.md to index.html
      - name: Convert Markdown to HTML
        run: |
          pandoc index.md -o index.html --standalone --mathjax --resource-path=.:images

      # Step 4: Deploy to GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .  # Deploy from the root directory
          force_orphan: true  # Optional: Keeps only the latest deploy
          publish_branch: gh-pages  # Explicitly specify the branch