name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - master  # Trigger on pushes to the master branch
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Set up Pandoc
      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      # Step 3: Create a build directory and convert Markdown to HTML
      - name: Build Site
        run: |
          mkdir _site
          pandoc index.md -o _site/index.html --standalone \
            --mathjax=https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml-full.js \
            --resource-path=.:images
          # Copy other necessary assets to the _site directory
          cp README.md _site/ # If you want README to be part of the site
          cp script.js _site/
          cp style.css _site/
          cp -r images _site/ # Copy the entire images directory

      # Step 4: Deploy to GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site  # Deploy from the new _site directory
          force_orphan: true
          publish_branch: gh-pages